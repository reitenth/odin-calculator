<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculator</title>
    <link rel="stylesheet" href="./style.css" />
</head>

<body>
    <div class="container">
        <div class="displayrow">
            <div class="toprow">34 + 34 =</div>
            <div class="bottomrow">68</div>
        </div>
        <div class="clearrow">
            <button id="clear">CLEAR</button>
            <button id="delete">DELETE</button>
        </div>
        <div class="numbercontainer">
            <button>7</button>
            <button>8</button>
            <button>9</button>
            <button>/</button>
            <button>5</button>
            <button>6</button>
            <button>7</button>
            <button>x</button>
            <button>1</button>
            <button>2</button>
            <button>3</button>
            <button>-</button>
            <button>.</button>
            <button>0</button>
            <button>=</button>
            <button>+</button>
        </div>
    </div>
    <script src="./script.js"></script>
</body>

</html>
