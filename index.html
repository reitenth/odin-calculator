<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculator</title>
    <link rel="stylesheet" href="./style.css" />
</head>

<body>
    <div class="container">

        <div class="displayrow">
            <div class="toprow">34 + 34 =</div>
            <div class="bottomrow">68</div>
        </div>

        <div class="clearrow">
            <div class="clearbutton">CLEAR</div>
            <div class="deletebutton">DELETE</div>
        </div>

        <div class="numbercontainer">
            <div class="numrow1">
                <div class="num7">7</div>
                <div class="num8">8</div>
                <div class="num9">9</div>
                <div class="numdivide">/</div>
            </div>

            <div class="numrow2">
                <div class="num4">4</div>
                <div class="num5">5</div>
                <div class="num6">6</div>
                <div class="numtimes">x</div>
            </div>

            <div class="numrow3">
                <div class="num1">1</div>
                <div class="num2">2</div>
                <div class="num3">3</div>
                <div class="numsubtract">-</div>
            </div>

            <div class="numrow4">
                <div class="numperiod">.</div>
                <div class="num0">0</div>
                <div class="numequals">=</div>
                <div class="numplus">+</div>
            </div>
        </div>

    </div>
    <script src="./script.js"></script>
</body>

</html>
